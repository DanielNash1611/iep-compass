  <text x="150" y="420" font-size="30" font-family="Arial, sans-serif" fill="#21313a">1. Extended time on quizzes and tests (time and a half).</text>
  <text x="150" y="500" font-size="30" font-family="Arial, sans-serif" fill="#21313a">2. Small-group / reduced distraction setting for tests.</text>
