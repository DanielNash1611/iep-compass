version = 1
name = "IEP Compass"

[setup]
script = """
npm ci
mkdir -p public/models
"""

[[actions]]
name = "Run app"
icon = "run"
command = "npm run dev -- --host 0.0.0.0"

[[actions]]
name = "Build"
icon = "run"
command = "npm run build"

[[actions]]
name = "Lint"
icon = "run"
command = "npm run lint"

[[actions]]
name = "Test"
icon = "run"
command = "npm run test"

[[actions]]
name = "Image evals"
icon = "run"
command = "npm run evals:gemma:image"

[[actions]]
name = "Accommodation evals"
icon = "run"
command = "npm run evals:gemma:image:accommodation"

[[actions]]
name = "Assignment evals"
icon = "run"
command = "npm run evals:gemma:image:assignment"
